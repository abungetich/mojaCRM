services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mojacrm
      POSTGRES_PASSWORD: mojacrm
      POSTGRES_DB: mojacrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mojacrm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      args:
        BIN: api
    ports:
      - "8090:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://mojacrm:mojacrm@postgres:5432/mojacrm?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev-secret-change-me
      ALLOW_ORIGIN: http://localhost:5173
      COOKIE_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      args:
        BIN: worker
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy

  seed:
    build:
      context: ./backend
      args:
        BIN: seed
    environment:
      DATABASE_URL: postgres://mojacrm:mojacrm@postgres:5432/mojacrm?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed

volumes:
  postgres_data:
  redis_data:
