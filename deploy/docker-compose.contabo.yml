# Production compose for the APP VPS (the existing Contabo box already
# running the shared `amac-caddy` reverse proxy + waterboy/PropSense).
#
# Postgres runs on this same box (own container/volume, alongside the other
# apps' own postgres containers — propsense-postgres, capstone-postgres,
# etc.) rather than a separate VPS. It's not exposed outside the docker
# network, so it's reachable only by the api/worker/seed containers here.
#
# Secrets come from /etc/mojacrm/.env.production (chmod 600), following the
# same pattern as /etc/propsense/.env.production.
#
# Deploy from the repo root (this file's build context is `..`):
#   docker compose -f deploy/docker-compose.contabo.yml up -d --build
#
# `name:` is pinned so container names are predictable regardless of which
# directory this is invoked from (Caddy's reverse_proxy targets them by name).

name: mojacrm

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - /etc/mojacrm/.env.production
    volumes:
      - /srv/mojacrm/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mojacrm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - mojacrm_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: Dockerfile.prod
      args:
        BIN: api
    restart: unless-stopped
    env_file:
      - /etc/mojacrm/.env.production
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3102:8080" # localhost-only, for health checks during deploy
    networks:
      - default
      - caddy

  worker:
    build:
      context: ..
      dockerfile: Dockerfile.prod
      args:
        BIN: worker
    restart: unless-stopped
    env_file:
      - /etc/mojacrm/.env.production
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - default

  # One-shot: `docker compose -f deploy/docker-compose.contabo.yml --profile seed run --rm seed`
  seed:
    build:
      context: ..
      dockerfile: Dockerfile.prod
      args:
        BIN: seed
    env_file:
      - /etc/mojacrm/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - seed

networks:
  default:
  caddy:
    external: true
    name: amacplc_amac-net

volumes:
  mojacrm_redis_data:
