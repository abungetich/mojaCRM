# Compose for the DEDICATED Postgres VPS — a separate box from the app VPS.
# Nothing else runs here. Postgres should NOT be reachable from the public
# internet except from the app VPS's IP (see DEPLOY.md for the ufw rules).
#
# Secrets come from /etc/mojacrm/.env.db (chmod 600).
#
#   docker compose -f docker-compose.db.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - /etc/mojacrm/.env.db
    ports:
      - "5432:5432" # restricted at the firewall (ufw) to the app VPS's IP only
    volumes:
      - /srv/mojacrm/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mojacrm}"]
      interval: 5s
      timeout: 5s
      retries: 10
